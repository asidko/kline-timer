name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Stamp version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i '' "s/static let value = \".*\"/static let value = \"$VERSION\"/" Sources/KlineTimer/Version.swift
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION" Info.plist

      - name: Build universal release
        run: swift build -c release --arch arm64 --arch x86_64

      - name: Assemble .app bundle
        # Reuse bundle.sh's assembly: feed it the universal binary, skip its build, ad-hoc sign.
        run: SKIP_BUILD=1 CODESIGN=1 BIN=.build/apple/Products/Release/KlineTimer ./bundle.sh

      - name: Build DMG
        run: ./tools/make-dmg.sh

      - name: Checksum
        run: shasum -a 256 "KlineTimer.dmg" > SHA256SUMS

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES=$(cat <<EOF
          ## Kline Timer ${{ github.ref_name }}

          A light, native macOS menu-bar app that counts down the current trading candle.

          ### Install
          \`\`\`sh
          curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | sh -s -- --tag ${{ github.ref_name }}
          \`\`\`
          Or download \`KlineTimer.dmg\` below, open it, and drag **Kline Timer** onto **Applications**.

          ### Platforms
          - macOS 13+ — universal (Apple Silicon + Intel)
          EOF
          )
          gh release create "${{ github.ref_name }}" \
            "KlineTimer.dmg" "SHA256SUMS" \
            --title "Kline Timer ${{ github.ref_name }}" \
            --notes "$NOTES"
